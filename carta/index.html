<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sumaq — Carta</title>
<meta name="description" content="Carta digital de Huari, alta cocina en Vallenar.">
<meta name="theme-color" content="#12141f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="stars-bg" aria-hidden="true"></div>

<header class="site-header">
  <div class="team-photo">
    <img src="images/equipo.jpg" alt="Equipo de cocina de Huari frente a las montañas del Valle del Huasco" width="850" height="1850" loading="eager">
  </div>
  <p class="eyebrow">Vallenar · Valle del Huasco</p>
  <h1 class="restaurant-name">Huari</h1>
  <p class="tagline">Alta cocina bajo el cielo más despejado del mundo</p>
</header>

<nav class="category-nav" aria-label="Categorías del menú">
  <div class="category-nav__track" id="categoryNav"></div>
</nav>

<main id="menuSections"></main>

<footer class="site-footer">
  <div class="footer-divider" aria-hidden="true">
    <svg viewBox="0 0 400 20" preserveAspectRatio="none">
      <line x1="0" y1="10" x2="400" y2="10" class="star-line"/>
      <circle cx="40" cy="10" r="1.6" class="star-dot"/>
      <circle cx="130" cy="10" r="1" class="star-dot"/>
      <circle cx="200" cy="10" r="2" class="star-dot star-dot--bright"/>
      <circle cx="270" cy="10" r="1" class="star-dot"/>
      <circle cx="360" cy="10" r="1.4" class="star-dot"/>
    </svg>
  </div>
  <p class="footer-hours" id="footerHours"></p>
  <p class="footer-location" id="footerLocation"></p>
  <button class="install-btn" id="installBtn" hidden>Instalar carta en el teléfono</button>
  <p class="offline-note" id="offlineNote" hidden>Estás sin conexión — mostrando la carta guardada.</p>
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
